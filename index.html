<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; font-src 'self'; connect-src 'self'; frame-src 'self' https://www.youtube-nocookie.com; object-src 'none'; base-uri 'self'; form-action 'none'">
<meta name="referrer" content="no-referrer">

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SOC122 Companion: weekly learning pathway</title>
<meta name="description" content="Instructor-created SOC122 companion website for weekly learning pathways, readings, concepts, walkthroughs, and study supports. Blackboard remains the official Seneca course platform.">
<link rel="stylesheet" href="./fonts/fonts.css">
<style>
  :root{
    --navy:#1B2A4A; --red:#DA291C; --red-dark:#961A13; --amber:#F2A900; --page:#F7F8FA; --surface:#fff;
    --surface-alt:#FBFCFD; --soft:#EEF1F5; --border:#DEE3EA; --border-hover:#C9D1DC;
    --ink:#15171C; --ink-dim:#474C57; --ink-faint:#6B7280; --focus:#1552D8;
    --sans:'IBM Plex Sans',ui-sans-serif,system-ui,'Segoe UI',Arial,sans-serif;
    --mono:'IBM Plex Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;overflow-x:hidden}
  body{font-family:var(--sans);background:var(--page);color:var(--ink);-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input{font-family:inherit}
  ::selection{background:#FCEFD2}
  *:focus-visible{outline:2px solid var(--focus);outline-offset:2px;border-radius:4px}
  a{color:#0b4fc0}
  .mono{font-family:var(--mono)}
  .skip{position:absolute;left:-999px;top:0;background:var(--ink);color:#fff;padding:10px 16px;z-index:200;border-radius:0 0 8px 0}
  .skip:focus{left:0}
  .vh{position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden}
  .soc-weekstrip{display:none}
  .soc-mobile-menu{display:none!important}
  .soc-mobile-jump{display:none}
  .soc-mobile-scrim{display:none}
  @keyframes riseUp{from{transform:translateY(8px);opacity:.4}to{transform:translateY(0);opacity:1}}
  .rise{animation:riseUp .26s ease both}
  .scrollarea::-webkit-scrollbar{width:10px;height:10px}
  .scrollarea::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;border:3px solid var(--page)}
  .hshelf::-webkit-scrollbar{height:9px}
  .hshelf::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
  /* hover states (prototype used a custom style-hover; here as classes) */
  .card{transition:box-shadow .15s ease,border-color .15s ease}
  .card:hover{box-shadow:0 6px 18px rgba(27,42,74,.12);border-color:var(--border-hover)}
  .idxrow:hover{background:var(--surface-alt)}
  .relrow{transition:box-shadow .15s ease,border-color .15s ease}
  .relrow:hover{border-color:var(--border-hover);box-shadow:0 3px 10px rgba(27,42,74,.08)}
  .flip{perspective:1200px;height:248px;border:none;background:none;padding:0;display:block;width:100%;text-align:left;cursor:pointer}
  .flip-inner{position:relative;display:block;width:100%;height:100%;transition:transform .55s cubic-bezier(.2,.7,.2,1);transform-style:preserve-3d}
  .flip.flipped .flip-inner{transform:rotateY(180deg)}
  .flip-face{position:absolute;inset:0;display:flex;flex-direction:column;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);border-radius:14px;padding:17px 18px;overflow:auto;box-shadow:0 1px 2px rgba(21,23,28,.04)}
  .flip-front{background:#fff}
  .flip-back{background:#1B2A4A;color:#fff;transform:rotateY(180deg)}
  .flip:hover .flip-front{border-color:var(--border-hover);box-shadow:0 6px 18px rgba(27,42,74,.12)}
  @media (prefers-reduced-motion:reduce){.flip-inner{transition:none}}
  .mapsrc:hover{background:var(--page)}
  .addtile:hover{border-color:var(--navy)!important;color:var(--navy)!important}
  .pickchip:hover{border-color:var(--navy)!important}
  .removebtn:hover{color:var(--red)!important}
  .reader-lens-btn{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:38px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--ink);padding:8px 12px;font-size:.84rem;font-weight:800;box-shadow:0 3px 10px rgba(27,42,74,.06)}
  .reader-lens-btn.on{border-color:var(--red);background:#FBF4F3;color:var(--red)}
  .rl-dock{position:fixed;left:0;right:0;bottom:0;z-index:97;background:#fff;border-top:3px solid #DA291C;box-shadow:0 -10px 30px rgba(21,23,28,.18);padding:10px 18px calc(12px + env(safe-area-inset-bottom, 0px))}
  .rl-dock-head{display:flex;align-items:center;gap:10px}
  .rl-dock-head strong{display:inline-flex;align-items:center;gap:6px;font-size:.82rem;color:#B02318;letter-spacing:.03em;text-transform:uppercase}
  .rl-dock-hint{flex:1;font-size:.73rem;color:#474C57;line-height:1.4}
  .rl-dock-copy{font-size:1.5rem;line-height:1.6;font-weight:650;color:#15171C;max-height:5.6em;overflow:auto;padding-top:6px}
  @media (max-width:760px){.rl-dock-hint{display:none}.rl-dock-copy{font-size:1.3rem;max-height:4.6em}}
  textarea:focus-visible{outline:3px solid #1552D8!important;outline-offset:2px}
  .vid-load:focus-visible{outline:3px solid #7EB8FF!important;outline-offset:2px}
  .vid-cover{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1B2A4A 0%,#27436e 55%,#00777b 100%)}
  .vid-cover-play{width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.75);position:relative}
  .vid-cover-play:after{content:"";position:absolute;left:21px;top:15px;border-left:18px solid #fff;border-top:11px solid transparent;border-bottom:11px solid transparent}
  .vid-cover-note{font-size:.72rem;font-weight:600;letter-spacing:.04em;color:rgba(255,255,255,.85)}
  .wk-coll-btn{float:right;margin-left:12px;min-width:30px;min-height:30px;border:1px solid #DEE3EA;background:#fff;color:#474C57;border-radius:8px;font-size:1.05rem;font-weight:600;line-height:1;cursor:pointer}
  .wk-coll-btn:hover{background:#EEF1F5}
  .wk-coll-btn:focus-visible{outline:3px solid #1B2A4A;outline-offset:2px}
  section.wk-collapsed > :not(h2.wk-sec){display:none!important}
  section.wk-collapsed h2.wk-sec{margin-bottom:0}
  .wk-coll-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 14px}
  .wk-coll-bar button{border:1px solid #DEE3EA;background:#fff;color:#1B2A4A;border-radius:999px;font-size:.8125rem;font-weight:600;padding:7px 13px;cursor:pointer}
  .wk-coll-bar button:hover{background:#EEF1F5}
  .wk-coll-bar span{font-size:.75rem;color:#6B7280}
  .sc-panel{border:1px solid #DEE3EA;border-radius:16px;background:#fff;padding:20px 22px;margin:0 0 26px}
  .sc-stats{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 14px;font-size:.9rem;color:#474C57}
  .sc-stats b{color:#141821;font-size:1.05rem}
  .sc-rec{display:flex;align-items:center;justify-content:space-between;gap:14px;border:1px solid #EEF1F5;border-radius:12px;padding:12px 14px;margin:0 0 10px}
  .sc-rec b{font-size:.95rem;color:#141821}
  .sc-rec p{margin:3px 0 0;font-size:.85rem;color:#474C57}
  .sc-rec > button{flex:none;border:1px solid #1B2A4A;background:#1B2A4A;color:#fff;border-radius:999px;font-size:.8125rem;font-weight:600;padding:8px 14px;cursor:pointer}
  .sc-rec > button:hover{background:#33456B}
  .sc-nameform label{display:block;font-size:.85rem;font-weight:600;color:#141821;margin:8px 0 6px}
  .sc-nameform div{display:flex;gap:8px}
  .sc-nameform input{flex:1;max-width:260px;border:1px solid #DEE3EA;border-radius:9px;padding:8px 11px;font-size:.9rem}
  .sc-nameform button{border:1px solid #1B2A4A;background:#fff;color:#1B2A4A;border-radius:9px;font-size:.85rem;font-weight:600;padding:8px 14px;cursor:pointer}
  .sc-nameform small,.sc-nameline{display:block;margin-top:7px;font-size:.75rem;color:#6B7280}
  .sc-linkbtn{border:none;background:none;color:#1B2A4A;text-decoration:underline;font-size:.75rem;cursor:pointer;padding:0}
  .sc-how{margin-top:10px}
  .sc-how summary{font-size:.8125rem;font-weight:600;color:#474C57;cursor:pointer}
  .sc-how p{font-size:.8125rem;color:#6B7280;margin:6px 0 0}
  .home-intro .home-about{margin-top:8px}
  .home-intro summary{font-size:.95rem;font-weight:600;color:var(--red);cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px;padding:4px 0}
  .home-intro summary::-webkit-details-marker{display:none}
  .home-intro summary::before{content:"\25B8";display:inline-block;transition:transform .18s ease}
  .home-intro details[open] summary::before{transform:rotate(90deg)}
  .home-about-body{padding-top:8px}
  .home-about-body h3{font-size:1rem;margin:12px 0 6px;color:var(--ink)}
  @media (prefers-reduced-motion:reduce){.home-intro summary::before{transition:none}}
  .wk-rescue{border-left:4px solid #1B2A4A;background:#fff;border-radius:12px;padding:16px 18px;margin-top:14px;border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .wk-rescue-head .mono{font-size:.68rem;letter-spacing:.08em;color:var(--red);font-weight:800}
  .wk-rescue h3{font-size:1.16rem;margin:4px 0 6px;color:var(--ink)}
  .wk-rescue p{font-size:.9rem;line-height:1.55;color:var(--ink-dim);margin:0}
  .wk-rescue-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:13px}
  .wk-rescue-grid>div{border:1px solid var(--border);border-radius:10px;background:#FBFCFD;padding:12px 13px}
  .wk-rescue-grid b{display:block;font-size:.82rem;color:#1B2A4A;margin-bottom:5px}
  .wk-rescue-grid span{display:block;font-size:.84rem;line-height:1.42;color:var(--ink)}
  .wk-rescue-grid small{display:block;font-size:.75rem;line-height:1.4;color:var(--ink-dim);margin-top:6px}
  .wk-rescue-open{margin-top:10px;border:1px solid var(--border);background:#fff;color:var(--red);border-radius:8px;font-size:.8rem;font-weight:700;padding:7px 11px;cursor:pointer}
  .wk-rescue-foot{display:flex;gap:7px;align-items:flex-start;border:1px solid #D6E2EA;background:#F0F5F9;border-radius:10px;padding:10px 13px;margin-top:12px}
  .wk-rescue-foot b{font-size:.82rem;color:#1B2A4A;white-space:nowrap}
  .wk-rescue-foot span{font-size:.8rem;line-height:1.45;color:var(--ink-dim)}
  @media(max-width:760px){.wk-rescue-grid{grid-template-columns:1fr}.wk-rescue-foot{display:block}.wk-rescue-foot b{display:block;margin-bottom:4px;white-space:normal}}
  @media print{
  header,nav,.soc-mobile-scrim,.wk-coll-bar,.wk-coll-btn,.wk-cam-ctl,.rl-dock,.rl-panel,.wk-step-strip button{display:none!important}
  #soc-main{height:auto!important;overflow:visible!important}
  section.wk-collapsed > :not(h2.wk-sec){display:block!important}
  body{background:#fff!important}
  }
  .listen-pop{width:min(430px,calc(100vw - 20px))}
  .rl-voice{width:100%;max-width:none;margin-top:6px;border:1px solid #DEE3EA;border-radius:8px;padding:6px 8px;font-size:.8125rem;color:#15171C;background:#fff}
  .listen-btn span[aria-hidden]{font-size:.72rem}
  .rl-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:999px;background:#DA291C;color:#fff;font-size:.68rem;font-weight:700;margin-left:6px;padding:0 5px}
  #walk-overlay{position:fixed;inset:0;z-index:150;display:flex;flex-direction:column;background:radial-gradient(130% 100% at 50% -10%,#243154 0%,#141a28 55%,#090c12 100%);color:#fff;animation:walkfade .22s ease}
  @keyframes walkfade{from{opacity:0}to{opacity:1}}
  .walk-theme{position:absolute;top:20px;left:20px;z-index:4;height:42px;padding:0 16px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);color:#fff;border-radius:11px;font-size:.8rem;font-weight:600;cursor:pointer;backdrop-filter:blur(6px)}
  .walk-theme:hover{background:rgba(255,255,255,.18)}
  .walk-close{position:absolute;top:20px;right:20px;z-index:4;width:42px;height:42px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);color:#fff;border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px)}
  .walk-close:hover{background:rgba(255,255,255,.18)}
  .walk-stage{flex:1;display:flex;flex-direction:column;align-items:center;padding:72px clamp(24px,6vw,90px) 20px;min-height:0;overflow-y:auto;overflow-x:hidden}
  .walk-slide{max-width:960px;width:100%;margin:auto 0}
  .walk-slide{animation:walkin .42s cubic-bezier(.22,.61,.36,1)}
  @keyframes walkin{from{opacity:.4;transform:translateY(14px)}to{opacity:1;transform:none}}
  .walk-kicker{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:.72rem;letter-spacing:.16em;color:#FF6B5E;font-weight:700;margin-bottom:16px}
  .walk-title{font-size:clamp(2rem,5.5vw,3.4rem);line-height:1.05;font-weight:600;margin:0 0 18px;letter-spacing:-.015em;text-wrap:balance;text-shadow:0 2px 10px rgba(0,0,0,.32)}
  .walk-lead{font-size:clamp(1.05rem,2.2vw,1.32rem);line-height:1.6;color:#f5f7fb;margin:0 0 26px;max-width:660px;text-shadow:0 1px 3px rgba(0,0,0,.26)}
  .walk-q{border-left:3px solid #FF6B5E;padding:6px 0 6px 20px;margin-top:14px}
  .walk-q span{display:block;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;color:#d3d9e5;margin-bottom:8px}
  .walk-q b{font-size:clamp(1.25rem,2.6vw,1.55rem);line-height:1.32;font-weight:600;color:#fff}
  .walk-h{font-size:clamp(1.6rem,4vw,2.5rem);line-height:1.12;font-weight:600;margin:0 0 20px;letter-spacing:-.015em;text-wrap:balance;text-shadow:0 2px 10px rgba(0,0,0,.32)}
  .walk-body{font-size:clamp(1.08rem,2.4vw,1.34rem);line-height:1.72;color:#fff;margin:0;text-shadow:0 1px 3px rgba(0,0,0,.24)}
  .walk-cite{margin-top:20px;font-size:.85rem;color:#d9dfeb;font-style:italic}
  .walk-terms{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px 26px;margin:0}
  .walk-term-h{font-size:clamp(1.1rem,2vw,1.3rem);font-weight:600;color:#fff;margin:0 0 5px}
  .walk-term-d{font-size:clamp(.95rem,1.7vw,1.05rem);line-height:1.55;color:#f4f7fb}
  .walk-term-d i{color:#d3d9e5}
  .wkslide-close{text-align:center}
  .wkslide-close .walk-can{display:inline-block;text-align:left;margin:0 auto 4px}
  .wkslide-close .walk-reflect{max-width:640px;margin-left:auto;margin-right:auto;text-align:left}
  .wkslide-close .walk-can li{padding:9px 0 9px 34px;border-bottom:none}
  .walk-qlist,.walk-can{list-style:none;margin:0;padding:0}
  .walk-qlist li,.walk-can li{font-size:clamp(1.08rem,2.2vw,1.3rem);line-height:1.5;padding:16px 0 16px 34px;border-bottom:1px solid rgba(255,255,255,.16);position:relative;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2)}
  .walk-qlist li:before{content:"?";position:absolute;left:0;color:#FF6B5E;font-weight:700;font-size:1.2rem}
  .walk-can li:before{content:"\2713";position:absolute;left:0;color:#6FE39C;font-weight:700;font-size:1.2rem}
  .walk-reflect{margin-top:22px;background:none;border-top:1px solid rgba(255,255,255,.14);border-radius:0;padding:16px 0 0}
  .walk-reflect span{display:block;font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;color:#d3d9e5;margin-bottom:8px}
  .walk-reflect p{margin:0;font-size:clamp(1rem,2vw,1.12rem);line-height:1.6;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2)}
  .walk-cta{margin-top:22px;margin-bottom:4px;background:#DA291C;color:#fff;border:none;border-radius:11px;font-size:1rem;font-weight:600;padding:14px 26px;cursor:pointer}
  .walk-cta:hover{background:#c0241a}
  .walk-slide.wkslide-figure,.walk-slide.wkslide-model{max-width:min(1300px,95vw);height:100%}
  .walk-modelview{padding:0}
  .walk-modelshell{width:100%;height:100%;position:relative}
  .walk-modelshell>canvas{width:100%!important;height:100%!important;display:block}
  .walk-modelshell .wk-cam-ctl{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);margin:0;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;z-index:2}
  .walk-modelshell .wk-cam-ctl button{min-width:42px;height:40px;padding:0 12px;border:1px solid rgba(255,255,255,.28);background:rgba(20,26,40,.55);color:#fff;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer}
  .walk-modelshell .wk-cam-ctl button:hover{background:rgba(40,52,78,.75)}
  .walk-light .walk-modelshell .wk-cam-ctl button{border-color:#d3dae2;background:rgba(255,255,255,.85);color:#1B2A4A}
  .walk-figwrap{display:grid;grid-template-columns:minmax(220px,320px) 1fr;gap:34px;height:100%;align-items:center;width:100%}
  .walk-figtext{display:flex;flex-direction:column;gap:10px}
  .walk-fighead{font-size:clamp(1.4rem,2.4vw,2rem);line-height:1.15;font-weight:600;margin:0;letter-spacing:-.01em;text-wrap:balance}
  .walk-fignote{padding:40px;text-align:center;opacity:.7}
  .walk-figcap{font-size:clamp(.95rem,1.9vw,1.08rem);line-height:1.55;color:#f2f5fa;margin:0 0 16px;max-width:760px;text-shadow:0 1px 3px rgba(0,0,0,.22)}
  .walk-figview{height:100%;min-height:40vh;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:default;position:relative;background:radial-gradient(58% 54% at 50% 46%,rgba(255,255,255,.10),rgba(255,255,255,0) 72%)}
  .walk-figimg{max-width:100%;max-height:100%;transform-origin:center center;transition:transform .18s ease;will-change:transform;user-select:none;-webkit-user-drag:none;pointer-events:none;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.55),0 8px 24px rgba(0,0,0,.4)}
  .walk-figimg.nofx{transition:none}
  .walk-figctl{display:flex;gap:8px;justify-content:flex-start;flex-wrap:wrap;margin:6px 0 0}
  .walk-figctl button{min-width:46px;height:44px;padding:0 14px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);color:#fff;border-radius:11px;font-size:1.05rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .walk-figctl button:hover{background:rgba(255,255,255,.18)}
  .walk-bar{display:flex;align-items:center;gap:18px;justify-content:center;padding:18px 24px calc(20px + env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.1)}
  .walk-prev,.walk-next{width:48px;height:48px;border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.08);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none}
  .walk-prev{transform:scaleX(-1)}
  .walk-prev:hover,.walk-next:hover{background:rgba(255,255,255,.18)}
  .walk-prev:disabled,.walk-next:disabled{opacity:.28;cursor:default}
  .walk-dots{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;max-width:420px}
  .walk-dot{width:9px;height:9px;border-radius:50%;border:none;background:rgba(255,255,255,.26);cursor:pointer;padding:0;transition:transform .16s ease,background .16s ease}
  .walk-dot.on{background:#FF6B5E;transform:scale(1.35)}
  .walk-count{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:.82rem;color:rgba(255,255,255,.55);min-width:56px;text-align:center}
  #walk-overlay.walk-light{background:radial-gradient(120% 95% at 50% 25%,#ffffff 0%,#f5f8fc 65%,#eef2f8 100%);color:#141821}
  .walk-light .walk-lead,.walk-light .walk-body,.walk-light .walk-qlist li,.walk-light .walk-can li,.walk-light .walk-q b,.walk-light .walk-reflect p,.walk-light .walk-terms dt,.walk-light .walk-terms dd{color:#1f2733}
  .walk-light .walk-title,.walk-light .walk-h{color:#0f1520}
  .walk-light .walk-cite,.walk-light .walk-q span,.walk-light .walk-reflect span,.walk-light .walk-count,.walk-light .walk-figcap,.walk-light .walk-terms dd i,.walk-light .walk-terms i{color:#6b7280}
  .walk-light .walk-term-h{color:#0f1520}
  .walk-light .walk-term-d{color:#28303c}
  .walk-light .walk-term-d i{color:#6b7280}
  .walk-light .walk-kicker{color:#B02318}
