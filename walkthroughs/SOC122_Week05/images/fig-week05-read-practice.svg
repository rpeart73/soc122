<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" role="img" aria-labelledby="title desc">
<title id="title">SOC122 Week 5 source to conclusion flow</title>
<desc id="desc">Diagram showing learning moving from the CBC video to an evidence audit, an authority audit, and a careful conclusion.</desc>
<rect width="680" height="440" fill="#ffffff"/>
<text x="340" y="48" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#15171C">From Source to Conclusion</text>
<rect x="40" y="130" width="135" height="130" rx="8" fill="#FFF6F5" stroke="#DA291C" stroke-width="3"/>
<text x="107.5" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Watch</text>
<text x="107.5" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">CBC Marketplace</text>
<text x="107.5" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">required source</text>
<rect x="200" y="130" width="135" height="130" rx="8" fill="#ffffff" stroke="#DA291C" stroke-width="3"/>
<text x="267.5" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Audit</text>
<text x="267.5" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">OpenStax tests</text>
<text x="267.5" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">evidence and limits</text>
<rect x="360" y="130" width="135" height="130" rx="8" fill="#F7F7F7" stroke="#DA291C" stroke-width="3"/>
<text x="427.5" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Question</text>
<text x="427.5" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">Two-Eyed Seeing tests</text>
<text x="427.5" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">authority and duty</text>
<rect x="520" y="130" width="120" height="130" rx="8" fill="#ffffff" stroke="#DA291C" stroke-width="3"/>
<text x="580.0" y="164" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#15171C">Conclude</text>
<text x="580.0" y="196" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">Shows, suggests,</text>
<text x="580.0" y="218" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#333333">does not establish</text>
<line x1="175" y1="195" x2="200" y2="195" stroke="#DA291C" stroke-width="5"/>
<line x1="335" y1="195" x2="360" y2="195" stroke="#DA291C" stroke-width="5"/>
<line x1="495" y1="195" x2="520" y2="195" stroke="#DA291C" stroke-width="5"/>
<text x="340" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="600" fill="#333333">Keep evidence, uncertainty, and responsibility visible.</text>
</svg>
